<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — {{ data.name }}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { accent: '#06b6d4' },
          fontFamily: {
            display: ['Bebas Neue', 'sans-serif'],
            sans:    ['Montserrat', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body class="text-gray-100 font-sans overflow-x-hidden min-h-screen flex flex-col" style="background-color:#1c1c1c; cursor:none;">

  <!-- Custom cursor -->
  <div id="cursor" class="fixed top-0 left-0 pointer-events-none z-[9999]">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
  </div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 py-4 px-6 md:px-8 transition-all duration-300" id="navbar">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="/" class="font-display text-2xl md:text-3xl tracking-widest text-accent">{{ data.name }}</a>
      <a href="/" class="text-xs md:text-sm font-semibold text-gray-400 hover:text-accent transition-colors tracking-widest uppercase">← Back</a>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex flex-col items-center px-4 pt-28 pb-16">

    <div class="w-full max-w-4xl" id="resume-content">

      <!-- Header row -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div>
          <p class="text-accent font-semibold tracking-widest uppercase text-xs mb-2">My Resume</p>
          <h1 class="font-display text-5xl md:text-6xl tracking-wider">{{ data.name }}</h1>
        </div>
        <a href="/static/images/DraftResumeFinale1 - Google Docs (2).pdf" download
           class="primary-btn font-bold px-6 py-3 tracking-widest text-sm uppercase flex items-center gap-2 rounded">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Download
        </a>
      </div>

      <!-- Loading indicator -->
      <div id="pdf-loading" class="text-center py-12 text-gray-500 text-sm tracking-widest uppercase">
        Loading resume...
      </div>

      <!-- PDF renders here as canvases -->
      <div id="pdf-container" class="w-full space-y-4"></div>

    </div>
  </main>

  <footer class="py-6 text-center text-gray-800 text-xs border-t border-gray-900 tracking-widest uppercase">
    <p>{{ data.name }} · 2026</p>
  </footer>

  <script>
    // Cursor
    const isTouchDevice = window.matchMedia("(hover: none) and (pointer: coarse)").matches;
    if (!isTouchDevice) {
      const dot = document.getElementById("cursor-dot");
      const ring = document.getElementById("cursor-ring");
      let mx = 0, my = 0, rx = 0, ry = 0;
      window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; gsap.set(dot, {x:mx, y:my}); });
      (function loop() { rx += (mx-rx)*0.5; ry += (my-ry)*0.5; gsap.set(ring,{x:rx,y:ry}); requestAnimationFrame(loop); })();
      document.querySelectorAll("a,button").forEach(el => {
        el.addEventListener("mouseenter", () => document.body.classList.add("cursor-hover"));
        el.addEventListener("mouseleave", () => document.body.classList.remove("cursor-hover"));
      });
    }

    window.addEventListener("scroll", () => {
      document.getElementById("navbar").classList.toggle("scrolled", window.scrollY > 50);
    });

    gsap.from("#resume-content", { opacity: 0, y: 30, duration: 0.8, ease: "power3.out", delay: 0.2 });

    // PDF.js render
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const container = document.getElementById('pdf-container');
    const loading   = document.getElementById('pdf-loading');
    const pdfUrl    = '/static/images/DraftResumeFinale1 - Google Docs (2).pdf';

    pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
      loading.style.display = 'none';
      const dpr = window.devicePixelRatio || 1;
      const renders = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        renders.push(
          pdf.getPage(i).then(page => {
            const containerWidth = container.clientWidth || window.innerWidth - 32;
            const unscaled = page.getViewport({ scale: 1 });
            const scale    = (containerWidth / unscaled.width) * dpr;
            const viewport = page.getViewport({ scale });

            const canvas  = document.createElement('canvas');
            canvas.width  = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width  = '100%';
            canvas.style.height = 'auto';
            canvas.style.borderRadius = '8px';
            canvas.style.border = '1px solid rgba(255,255,255,0.06)';

            container.appendChild(canvas);
            return page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
          })
        );
      }
      return Promise.all(renders);
    }).catch(() => {
      loading.textContent = 'Could not load resume. Please download it below.';
    });
  </script>
</body>
</html>
