<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ project.title if project else "Project" }} — {{ data.name }}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { accent: '#06b6d4' },
          fontFamily: {
            display: ['Bebas Neue', 'sans-serif'],
            sans:    ['Montserrat', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body class="text-gray-100 font-sans min-h-screen flex flex-col" style="background-color:#1c1c1c; cursor:none;">

  <!-- Custom cursor -->
  <div id="cursor" class="fixed top-0 left-0 pointer-events-none z-[9999]">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
  </div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 py-4 px-8 bg-[#1c1c1c]/90 backdrop-blur border-b border-gray-900">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="/" class="font-display text-3xl tracking-widest text-accent">{{ data.name }}</a>
      <a href="/#projects" class="text-sm font-semibold text-gray-400 hover:text-accent transition-colors tracking-widest uppercase">← Back to Projects</a>
    </div>
  </nav>

  <!-- Page wrapper: gears are positioned relative to this -->
  <div class="relative flex-1 flex flex-col overflow-hidden">

    <!-- Main content -->
    <main class="flex-1 flex items-center justify-center px-6 pt-24 pb-16 relative z-10">
      <div class="text-center max-w-2xl mx-auto" id="content">

        <!-- Center gear -->
        <img src="/static/images/gear.png" alt="gear" class="w-24 h-24 mx-auto mb-8 spin-gear gear-teal" style="opacity:0.85;" />

        <p class="text-accent font-semibold tracking-[0.4em] uppercase text-sm mb-4">
          {{ project.title if project else "Project" }}
        </p>

        <h1 class="font-display text-7xl md:text-9xl tracking-wider mb-6 text-white">
          IN DEVELOPMENT
        </h1>

        <p class="text-gray-500 text-base leading-relaxed mb-10">
          This project page is currently being built. Check back soon for updates.
        </p>

        <a href="/#projects"
           class="inline-block primary-btn font-bold px-8 py-3 tracking-widest text-sm uppercase">
          <span>Back to Projects</span>
        </a>
      </div>
    </main>

    <footer class="py-6 text-center text-gray-800 text-xs border-t border-gray-900 tracking-widest uppercase relative z-10">
      <p>{{ data.name }} · 2026</p>
    </footer>

  </div>

  <script>
    const isTouchDevice = window.matchMedia("(hover: none) and (pointer: coarse)").matches;
    if (!isTouchDevice) {
      const dot  = document.getElementById("cursor-dot");
      const ring = document.getElementById("cursor-ring");
      let mx = 0, my = 0, rx = 0, ry = 0;
      window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; gsap.set(dot, {x: mx, y: my}); });
      (function loop() { rx += (mx-rx)*0.5; ry += (my-ry)*0.5; gsap.set(ring,{x:rx,y:ry}); requestAnimationFrame(loop); })();
      document.querySelectorAll("a,button").forEach(el => {
        el.addEventListener("mouseenter", () => document.body.classList.add("cursor-hover"));
        el.addEventListener("mouseleave", () => document.body.classList.remove("cursor-hover"));
      });
    }

    gsap.from("#content", { opacity: 0, y: 40, duration: 0.9, ease: "back.out(1.4)", delay: 0.2 });
  </script>
</body>
</html>
